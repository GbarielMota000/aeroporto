<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Inteligente</title>
    <!-- Aqui nós "puxamos" o arquivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <!-- PAINEL DO JATO EXECUTIVO -->
        <div class="painel" id="jato">
            <h2>Jato Executivo</h2>
            <img src="nome-da-sua-imagem.png" alt="Jato" id="img-jato" class="aviao-img">
            
            <div class="infos">
                <p>Código: <span id="jato-codigo">--</span></p>
                <p>Status: <span id="jato-status">--</span></p>
                <p>Altitude: <span id="jato-altitude">--</span></p>
                <!-- Info exclusiva do Jato -->
                <p class="destaque">Supersônico: <span id="jato-super">Desativado</span></p>
            </div>

            <div class="botoes">
                <button id="btn-jato-decolar">Decolar ✈️</button>
                <button id="btn-jato-pousar">Pousar 🛬</button>
            </div>
            <!-- Botões exclusivos do Jato -->
            <div class="botoes">
                <button id="btn-ativar-super" class="btn-especial">Ativar Supersônico 🚀</button>
                <button id="btn-desativar-super">Desativar Supersônico</button>
            </div>
        </div>

        <!-- PAINEL DO VOO DE CARGA -->
        <div class="painel" id="carga">
            <h2>Avião Cargueiro</h2>
            <img src="nome-da-sua-imagem.png" alt="Cargueiro" id="img-carga" class="aviao-img">
            
            <div class="infos">
                <p>Código: <span id="carga-codigo">--</span></p>
                <p>Status: <span id="carga-status">--</span></p>
                <p>Altitude: <span id="carga-altitude">--</span></p>
                <!-- Infos exclusivas do Cargueiro -->
                <p class="destaque">Capacidade: <span id="carga-max">--</span> ton</p>
                <p class="destaque">Carga Atual: <span id="carga-atual">--</span> ton</p>
            </div>

            <div class="botoes">
                <button id="btn-carga-decolar">Decolar ✈️</button>
                <button id="btn-carga-pousar">Pousar 🛬</button>
            </div>
            <!-- Controles exclusivos do Cargueiro -->
            <div class="controles-carga">
                <input type="number" id="input-peso" placeholder="Peso (ton)" min="1">
                <button id="btn-embarcar" class="btn-especial">Embarcar Carga 📦</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
